<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>重来</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}

  :root{
    --bg:#0b0b12;
    --surface:#12121e;
    --surface2:#1a1a2a;
    --border:rgba(255,255,255,0.06);
    --border-hover:rgba(255,255,255,0.12);
    --accent:#c47a7a;
    --accent-soft:rgba(196,122,122,0.12);
    --text:#e8e6e3;
    --text-dim:rgba(232,230,227,0.75);
    --text-dimmer:rgba(232,230,227,0.55);
    --gold:#c4a67a;
    --gold-soft:rgba(196,166,122,0.1);
    --radius:12px;
    --radius-sm:8px;
    --font-serif:'Noto Serif SC','Source Han Serif SC','STSong',serif;
    --font-sans:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;
  }

  html{background:var(--bg)}
  body{
    font-family:var(--font-sans);
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    -webkit-font-smoothing:antialiased;
  }

  #app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    position:relative;
  }

  .screen{display:none;flex-direction:column;height:100vh}
  .screen.active{display:flex}

  /* ===== 开始画面 ===== */
  #startScreen{
    justify-content:center;
    align-items:center;
    padding:60px 36px;
    text-align:center;
  }

  #startScreen h1{
    font-family:var(--font-serif);
    font-size:56px;
    font-weight:300;
    letter-spacing:20px;
    color:var(--text);
    margin-bottom:20px;
    opacity:0.9;
  }

  .tagline{
    font-size:13px;
    color:var(--text-dim);
    letter-spacing:6px;
    font-weight:300;
    margin-bottom:56px;
    line-height:2;
  }

  .sg{
    width:100%;
    margin-bottom:28px;
    text-align:left;
  }
  .sg:last-of-type{margin-bottom:36px}

  .sg label{
    display:block;
    font-size:11px;
    color:var(--text-dimmer);
    letter-spacing:2px;
    margin-bottom:10px;
    font-weight:300;
    text-transform:uppercase;
  }

  select{
    width:100%;
    padding:14px 16px;
    border-radius:var(--radius);
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text);
    font-size:14px;
    font-family:var(--font-sans);
    appearance:none;
    cursor:pointer;
    outline:none;
    transition:border-color .3s;
    letter-spacing:1px;
  }
  select:hover,select:focus{border-color:var(--border-hover)}

  .g2{display:flex;gap:10px}
  .g2 .b{
    flex:1;
    padding:14px;
    border-radius:var(--radius);
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text-dim);
    font-size:14px;
    font-family:var(--font-sans);
    cursor:pointer;
    text-align:center;
    letter-spacing:2px;
    transition:all .3s ease;
    font-weight:300;
  }
  .g2 .b:hover{border-color:var(--border-hover);color:var(--text)}
  .g2 .b.on{
    border-color:var(--accent);
    color:var(--accent);
    background:var(--accent-soft);
  }

  .btn-p{
    width:100%;
    padding:15px;
    border:none;
    border-radius:var(--radius);
    background:var(--text);
    color:var(--bg);
    font-size:14px;
    font-family:var(--font-sans);
    font-weight:500;
    letter-spacing:3px;
    cursor:pointer;
    transition:opacity .3s;
    margin-top:4px;
  }
  .btn-p:hover{opacity:.85}
  .btn-p:disabled{opacity:.2;cursor:not-allowed}

  .btn-s{
    width:100%;
    padding:13px;
    border:1px solid var(--border);
    border-radius:var(--radius);
    background:transparent;
    color:var(--text-dimmer);
    font-size:12px;
    font-family:var(--font-sans);
    letter-spacing:2px;
    cursor:pointer;
    transition:all .3s;
    margin-top:10px;
  }
  .btn-s:hover{border-color:var(--border-hover);color:var(--text)}

  #genderNote{
    margin:0 0 8px;
    padding:10px 14px;
    border-radius:var(--radius-sm);
    font-size:12px;
    line-height:1.6;
    display:none;
  }

  /* ===== 加载 ===== */
  #loadingScreen{justify-content:center;align-items:center;gap:16px}
  .spinner{width:24px;height:24px;border:1.5px solid var(--border);border-top-color:var(--text-dim);border-radius:50%;animation:sp .8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .load-t{font-size:12px;color:var(--text-dimmer);letter-spacing:2px;font-weight:300}

  /* ===== 人格简介 ===== */
  #introScreen{padding:48px 36px;overflow-y:auto}
  .intro-h{text-align:center;margin-bottom:32px}
  .intro-h .code{font-size:11px;color:var(--text-dimmer);letter-spacing:3px;margin-bottom:6px}
  .intro-h .name{font-family:var(--font-serif);font-size:26px;font-weight:300;letter-spacing:6px;color:var(--text);margin-bottom:4px}
  .intro-h .theme{font-size:13px;color:var(--text-dim);font-style:italic;letter-spacing:1px;line-height:1.6}
  .intro-k{
    background:var(--gold-soft);
    border:1px solid rgba(196,166,122,0.15);
    border-radius:var(--radius);
    padding:20px 22px;
    text-align:center;
    margin-bottom:20px;
  }
  .intro-k .l{font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;font-weight:300}
  .intro-k .v{font-family:var(--font-serif);font-size:15px;color:var(--text);line-height:1.7;font-style:italic;letter-spacing:0.5px}
  .intro-s{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:18px 20px;
    margin-bottom:12px;
  }
  .intro-s .l{font-size:10px;color:var(--text-dimmer);letter-spacing:2px;margin-bottom:8px;font-weight:300;text-transform:uppercase}
  .intro-s .v{font-size:13px;color:var(--text);line-height:1.8;letter-spacing:0.5px}

  /* ===== 游戏画面 ===== */
  #gameScreen{position:relative}
  .gh{
    padding:16px 20px 12px;
    background:rgba(11,11,18,0.92);
    border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:100;
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
  }
  .gh-t{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .gh-p{display:flex;align-items:baseline;gap:6px}
  .gh-p .c{font-size:13px;color:var(--accent);letter-spacing:1px}
  .gh-p .n{font-size:11px;color:var(--text-dimmer);letter-spacing:1px}
  .gh-d{
    font-size:10px;
    padding:4px 12px;
    border-radius:20px;
    letter-spacing:1px;
    border:1px solid var(--border);
    color:var(--text-dimmer);
    font-weight:300;
  }
  .gh-d.rl{border-color:var(--gold-soft);color:var(--gold)}

  .tb{height:2px;background:rgba(255,255,255,0.04);border-radius:1px;overflow:hidden}
  .tb-in{height:100%;border-radius:1px;transition:width .8s cubic-bezier(.4,0,.2,1);background:linear-gradient(90deg,var(--accent),var(--gold))}
  .tl{display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim);margin-top:5px;letter-spacing:0.5px}

  .chat{
    flex:1;
    overflow-y:auto;
    padding:24px 20px 160px;
    scroll-behavior:smooth;
  }
  .chat::-webkit-scrollbar{width:2px}
  .chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,.05);border-radius:1px}

  .b{margin-bottom:20px}
  .b.sys{text-align:center}
  .b.sys .t{display:inline-block;padding:5px 14px;font-size:10px;color:var(--text-dimmer);letter-spacing:1px;font-weight:300}
  .b.pa{display:flex;flex-direction:column;align-items:flex-start}
  .b.pa .t{
    max-width:88%;
    padding:14px 18px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:4px 16px 16px 16px;
    color:var(--text);
    line-height:1.8;
    font-size:14px;
    white-space:pre-wrap;
    font-weight:300;
  }
  .b.pl{display:flex;flex-direction:column;align-items:flex-end}
  .b.pl .t{
    max-width:88%;
    padding:14px 18px;
    background:var(--accent-soft);
    border:1px solid rgba(196,122,122,0.15);
    border-radius:16px 4px 16px 16px;
    color:var(--text);
    line-height:1.8;
    font-size:14px;
    white-space:pre-wrap;
    font-weight:300;
  }
  .b.nar{text-align:center;margin:8px 0}
  .b.nar .t{font-size:13px;color:var(--text-dim);line-height:1.9;padding:4px;font-style:italic;letter-spacing:0.5px}
  .b.re{font-size:12px;color:var(--text-dim);padding:0 4px 4px;letter-spacing:0.5px}
  .b.fade{animation:fIn .5s ease}
  @keyframes fIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  .oa{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:480px;
    padding:14px 20px 24px;
    background:rgba(11,11,18,0.95);
    border-top:1px solid var(--border);
    z-index:200;
    transition:transform .4s cubic-bezier(.4,0,.2,1);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
  }
  .oa.hidden{transform:translateX(-50%) translateY(110%)}

  .ob{
    width:100%;
    padding:15px 18px;
    border:1px solid var(--border);
    border-radius:var(--radius);
    background:var(--surface);
    color:var(--text);
    font-size:13px;
    font-family:var(--font-sans);
    cursor:pointer;
    margin-bottom:10px;
    transition:all .3s;
    text-align:left;
    line-height:1.6;
    letter-spacing:0.5px;
    font-weight:300;
  }
  .ob:last-child{margin-bottom:0}
  .ob:hover{border-color:var(--border-hover);background:var(--surface2)}
  .ob.dis{opacity:.2;cursor:not-allowed}

  /* ===== 结局 / 复盘 ===== */
  #endScreen{overflow-y:auto;padding:48px 36px 40px}
  .end-hd{text-align:center;margin-bottom:32px}
  .end-hd .emoji{font-size:48px;margin-bottom:8px;opacity:.6}
  .end-hd .code{font-size:10px;color:var(--text-dimmer);letter-spacing:2px;margin-bottom:6px}
  .end-hd .title{font-family:var(--font-serif);font-size:24px;font-weight:300;letter-spacing:4px;color:var(--text)}
  .end-t{font-size:13px;color:var(--text);line-height:2;max-width:380px;margin:0 auto 28px;text-align:left;white-space:pre-wrap;letter-spacing:0.5px}

  .rs{border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px}
  .rs h3{font-size:10px;color:var(--text-dimmer);letter-spacing:2px;font-weight:300;margin-bottom:12px;text-transform:uppercase}
  .rs-r{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.03)}
  .rs-r:last-child{border:none}
  .rs-r .l{font-size:12px;color:var(--text-dimmer);font-weight:300}
  .rs-r .v{font-size:13px;color:var(--text)}
  .rs-r .v.g{color:var(--gold)}
  .rs-r .v.ag{color:var(--accent)}
  .rs-r .v.gr{color:var(--text-dim)}

  .ch-item{padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03)}
  .ch-item:last-child{border:none}
  .ch-item .sc{font-size:10px;color:var(--text-dimmer);letter-spacing:1px}
  .ch-item .tx{font-size:12px;color:var(--text);margin:3px 0;line-height:1.5;font-weight:300}
  .ch-item .delta{font-size:11px}
  .ch-item .delta.p{color:var(--gold)}.ch-item .delta.n{color:var(--accent)}

  .end-act{display:flex;flex-direction:column;gap:10px;margin-top:20px}
  .end-act button{padding:14px;border-radius:var(--radius);font-size:13px;letter-spacing:2px;cursor:pointer;transition:all .3s;font-family:var(--font-sans)}
  .btn-r{border:1px solid var(--text-dim);background:transparent;color:var(--text-dim)}
  .btn-r:hover{border-color:var(--text);color:var(--text)}
  .btn-b{border:1px solid var(--border);background:transparent;color:var(--text-dimmer)}
  .btn-b:hover{border-color:var(--border-hover);color:var(--text-dim)}

  .chart{display:flex;align-items:flex-end;gap:2px;height:40px;padding:4px 0}
  .chart .bar{flex:1;border-radius:1px;transition:height .6s ease;min-height:2px}
  .chart .bar.p{background:var(--gold)}
  .chart .bar.n{background:var(--accent)}
  .chart .bar.z{background:rgba(255,255,255,.06)}

  /* ===== 图鉴 ===== */
  #galleryScreen{padding:48px 36px;overflow-y:auto}
  .gal-h{display:flex;align-items:center;margin-bottom:32px}
  .gal-h h2{font-family:var(--font-serif);font-size:20px;font-weight:300;letter-spacing:4px;flex:1}
  .gal-bk{font-size:12px;color:var(--text-dimmer);cursor:pointer;background:none;border:none;font-family:var(--font-sans);letter-spacing:1px;transition:color .3s}
  .gal-bk:hover{color:var(--text-dim)}
  .gal-emp{text-align:center;color:var(--text-dim);font-size:13px;line-height:2;padding:48px 0;font-weight:300}
  .gal-p{border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px}
  .gal-p .hd{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
  .gal-p .hd .c{font-size:13px;color:var(--text);letter-spacing:1px}
  .gal-p .hd .nm{font-size:11px;color:var(--text-dimmer);letter-spacing:1px}
  .gal-bs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
  .gal-b{border-radius:3px;padding:3px 8px;font-size:10px;letter-spacing:1px;font-weight:300}
  .gal-b.b{border:1px solid rgba(196,122,122,.25);color:var(--accent);background:var(--accent-soft)}
  .gal-b.n{border:1px solid rgba(232,230,227,.15);color:var(--text-dim)}
  .gal-b.g{border:1px solid rgba(196,166,122,.2);color:var(--gold);background:var(--gold-soft)}
  .gal-b.p{border:1px solid rgba(196,166,122,.3);color:var(--gold);background:var(--gold-soft)}
  .gal-ft{display:flex;justify-content:space-between;font-size:10px;color:var(--text-dimmer);letter-spacing:1px}

  .cr{background:rgba(196,166,122,.06);border:1px solid rgba(196,166,122,.12);border-radius:var(--radius-sm);padding:10px 14px;font-size:11px;color:var(--gold);margin-bottom:16px;text-align:center;letter-spacing:1px;font-weight:300}

  @media(max-width:480px){
    #app{max-width:100%}
    #startScreen{padding:48px 28px}
    #startScreen h1{font-size:44px;letter-spacing:14px}
    .b.pa .t,.b.pl .t{max-width:92%;font-size:13px}
    .intro-h .name{font-size:22px}
    #endScreen{padding:40px 28px}
    .ob{font-size:12px;padding:13px 14px;word-break:break-word}
    .b.pa .t,.b.pl .t{font-size:13px;padding:12px 14px;word-break:break-word}
    .gh{padding:12px 14px 10px}
    .chat{padding:16px 14px 190px}
    .rs{padding:14px 16px}
  }
  @media(max-width:360px){
    #startScreen h1{font-size:36px;letter-spacing:10px}
    .b.pa .t,.b.pl .t{font-size:12px;padding:10px 12px}
    .ob{font-size:11px;padding:11px 12px}
    .sg select{font-size:13px;padding:12px 14px}
    .g2 .b{font-size:13px;padding:12px}
  }
</style>
</head>
<body>
<div id="app">

  <!-- ===== 开始画面 ===== -->
  <div id="startScreen" class="screen active">
    <h1>重来</h1>
    <div class="tagline">重来一次，又会是怎样的结果</div>

    <div class="sg">
      <label>TA的性格是</label>
      <select id="selP">
        <option value="">— 请选择 —</option>
        <option value="ISTJ">ISTJ · 物流师</option><option value="ISFJ">ISFJ · 守卫者</option>
        <option value="INFJ">INFJ · 提倡者</option><option value="INTJ">INTJ · 建筑师</option>
        <option value="ISTP">ISTP · 鉴赏家</option><option value="ISFP">ISFP · 探险家</option>
        <option value="INFP">INFP · 调停者</option><option value="INTP">INTP · 逻辑学家</option>
        <option value="ESTP">ESTP · 企业家</option><option value="ESFP">ESFP · 表演者</option>
        <option value="ENFP">ENFP · 竞选者</option><option value="ENTP">ENTP · 辩论家</option>
        <option value="ESTJ">ESTJ · 总经理</option><option value="ESFJ">ESFJ · 执政官</option>
        <option value="ENFJ">ENFJ · 主人公</option><option value="ENTJ">ENTJ · 指挥官</option>
      </select>
    </div>

    <div class="sg">
      <label>TA的性别是</label>
      <div class="g2" id="gg">
        <div class="b" data-v="male" onclick="sg(this)">男性</div>
        <div class="b" data-v="female" onclick="sg(this)">女性</div>
      </div>
    </div>

    <div class="sg">
      <label>轨迹</label>
      <div class="g2" id="dg">
        <div class="b on" data-v="理想线" onclick="sd(this)">理想线</div>
        <div class="b" data-v="现实线" onclick="sd(this)">现实线</div>
      </div>
    </div>

    <div id="gn" style="display:none"></div>
    <button class="btn-p" onclick="goIntro()" id="btnGo" disabled>了解 TA</button>
    <button class="btn-s" onclick="showGal()">结局图鉴</button>
  </div>

  <!-- ===== 加载 ===== -->
  <div id="loadingScreen" class="screen">
    <div class="spinner"></div>
    <div class="load-t">正在编织故事…</div>
  </div>

  <!-- ===== 人格简介 ===== -->
  <div id="introScreen" class="screen">
    <div class="intro-h">
      <div class="code" id="iCode">ISTP</div>
      <div class="name" id="iName">鉴赏家</div>
      <div class="theme" id="iTheme"></div>
    </div>
    <div class="intro-k">
      <div class="l">关于 TA</div>
      <div class="v" id="iKey"></div>
    </div>
    <div class="intro-s"><div class="l">藏在心里的</div><div class="v" id="iNeed"></div></div>
    <div class="intro-s"><div class="l">无声的边界</div><div class="v" id="iMine"></div></div>
    <div class="intro-s"><div class="l">暗流</div><div class="v" id="iConflict"></div></div>
    <button class="btn-p" onclick="startGame()" style="margin-top:12px">开始重来</button>
    <button class="btn-s" onclick="backStart()">返回</button>
  </div>

  <!-- ===== 游戏画面 ===== -->
  <div id="gameScreen" class="screen">
    <div class="gh">
      <div class="gh-t">
        <div class="gh-p">
          <span class="c" id="ghCode">ISTP</span>
          <span class="n" id="ghName">鉴赏家</span>
        </div>
        <span class="gh-d" id="ghDiff">理想线</span>
      </div>
      
    </div>
    <div class="chat" id="chat"></div>
    <div class="oa hidden" id="oa">
    <div id="pauseBtn" style="display:none">
      <button class="ob" id="continueBtn" onclick="U.cont()" style="text-align:center;letter-spacing:3px;color:var(--text-dim)">回应 TA</button>
    </div>
    <div id="optC"></div>
  </div>
  </div>

  <!-- ===== 结局/复盘 ===== -->
  <div id="endScreen" class="screen">
    <div class="end-hd">
      <div class="emoji" id="eEmoji">💔</div>
      <div class="code" id="eCode">BE-1</div>
      <div class="title" id="eTitle">被动模式</div>
    </div>
    <div class="end-t" id="eText"></div>
    <div class="rs" id="trustRS"><h3>信任值变化</h3><div id="tChart"></div></div>
    <div class="rs"><h3>关键数据</h3><div id="stats"></div></div>
    <div class="rs"><h3>选择回顾</h3><div id="choices"></div></div>
    <div class="end-act">
      <button class="btn-r" onclick="restartSame()">重来一次</button>
      <button class="btn-b" onclick="backStart()">返回主菜单</button>
    </div>
  </div>

  <!-- ===== 图鉴 ===== -->
  <div id="galleryScreen" class="screen">
    <div class="gal-h">
      <h2>结局图鉴</h2>
      <button class="gal-bk" onclick="backStart()">← 返回</button>
    </div>
    <div id="galC"></div>
  </div>

</div>

<script src="GameEngine.js"></script>
<script>
const DL={cache:{},async load(p){if(this.cache[p])return this.cache[p];const r=await fetch(`scripts/${p}.json`);const d=await r.json();this.cache[p]=d;return d}};

const U={g:null,selG:null,selD:'理想线',
  scr(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')},
  clr(){document.getElementById('chat').innerHTML=''},
  _t(s){if(!s)return s;const g=this.g?.state?.partnerGender||'male';return s.replace(/\{TA\}/g,g==='male'?'他':'她').replace(/\{TA的\}/g,g==='male'?'他的':'她的').replace(/\{TA自己\}/g,g==='male'?'他自己':'她自己')},
  bub(t,txt){const a=document.getElementById('chat'),d=document.createElement('div');d.className=`b ${t}`;d.innerHTML=`<div class="t">${this._t(txt)}</div>`;a.appendChild(d);a.scrollTop=a.scrollHeight;return d},
  tr(v){document.getElementById('tb').style.width=v+'%';document.getElementById('tv').textContent=v;const l=document.getElementById('tlv');l.textContent=v>=85?'信任':v>=70?'亲近':v>=50?'平淡':'疏远'},
  op(opts){const c=document.getElementById('optC'),a=document.getElementById('oa');c.innerHTML='';a.classList.remove('hidden');opts.forEach((o,i)=>{const b=document.createElement('button');b.className='ob'+(o.condition?' dis':'');b.textContent=`${['A','B','C'][i]}. ${o.text||''}`;b.onclick=()=>this.pk(i,o.id);c.appendChild(b)})},
  hide(){document.getElementById('oa').classList.add('hidden')},
  async pk(i,id){if(!this.g)return;this.hide();const d=await DL.load(this.g.state.personality),s=d.scenes[this.g.state.currentScene],o=s?.options?.find(x=>x.id===id);if(o){this.bub("pl",o.text||"");await sl(200);if(o.reaction){this.bub("re",o.reaction);await sl(400)}}this.g.setSkipEnter(true);const r=await this.g.chooseOption(id);if(r&&typeof r==="string"&&r.startsWith("BE-")){this.end(r)}else if(r&&r.nextScene){U._pendingAdvance=r;document.getElementById("oa").classList.remove("hidden");document.getElementById("pauseBtn").style.display="block";document.getElementById("continueBtn").textContent="在那之后…";document.getElementById("optC").innerHTML=""}},
  async end(code){const d=this.g.state,s=await DL.load(d.personality);GameEngine.saveEndingToGallery(d.personality,code,d.trust);this.scr('endScreen');const vt=this.g.getEndingVariant(code,s),bt=s.endings?.[code]?.text||'';const em={'BE-1':'💔','BE-2':'💔','BE-3':'💔','NE-1':'🌊','GE-1':'🔥','PE-1':'✨'};document.getElementById('eEmoji').textContent=em[code]||'💔';document.getElementById('eCode').textContent=code;const nm={'BE-1':'被动模式','BE-2':'工具箱关闭','BE-3':'你留下的是功能','NE-1':'冰层融化','GE-1':'行动被看见','PE-1':'不用解释的回应'};document.getElementById('eTitle').textContent=nm[code]||code;document.getElementById('eText').textContent=this._t((this.g.state.currentScene===null)?(vt||bt):(s.endings?.[code]?.text||''));this.recap(s);this.g.saveGame()},
  recap(sd){const r=this.g.getRecap();const h=r.trustHistory;let ch='';if(h.length>1){const mx=Math.max(100,...h.map(x=>x.trust));ch='<div class="chart">';h.forEach((x,i)=>{const p=Math.max(2,(x.trust/mx)*40);const c=x.change>0?'p':x.change<0?'n':'z';ch+=`<div class="bar ${c}" style="height:${p}px" title="第${i}步: ${x.trust} (${x.change>0?'+':''}${x.change||0})"></div>`});ch+='</div>'}else{ch='<div style="color:var(--text-dimmer);font-size:12px">数据不足</div>'}document.getElementById('tChart').innerHTML=ch;const fc=r.flagCount;document.getElementById('stats').innerHTML=`<div class="rs-r"><span class="l">最终信任值</span><span class="v ${r.trust>=70?'g':r.trust<30?'ag':'gr'}">${r.trust}</span></div><div class="rs-r"><span class="l">关键 Flag</span><span class="v">${fc}/9</span></div><div class="rs-r"><span class="l">经历场景</span><span class="v">${r.sceneHistory.length}</span></div><div class="rs-r"><span class="l">选择次数</span><span class="v">${r.choiceHistory.length}</span></div><div class="rs-r"><span class="l">解锁碎片</span><span class="v">${r.unlockedMemories.length}/7</span></div><div class="rs-r"><span class="l">轨迹</span><span class="v">${r.difficulty}</span></div>`;let ch2='';if(!r.choiceHistory.length){ch2='<div style="color:var(--text-dimmer);font-size:12px">暂无记录</div>'}else{r.choiceHistory.forEach((c,i)=>{const cls=c.trustChange>0?'p':c.trustChange<0?'n':'';const sign=c.trustChange>0?'+':'';ch2+=`<div class="ch-item"><div class="sc">${c.scene} · 选项 ${c.optionId}</div><div class="tx">${this._t(c.text||'')}</div><div class="delta ${cls}">信任值 ${sign}${c.trustChange||0}</div></div>`})}document.getElementById('choices').innerHTML=ch2},
  cont(){document.getElementById("pauseBtn").style.display="none";if(U._pendingAdvance){var _a=U._pendingAdvance;U._skipAdvance=false;U._pendingAdvance=null;U.g.setSkipEnter(false);U._pendingRender=null;U.g.enterScene(_a.nextScene,_a.scriptData);return}const opts=this._pendingOpts||[];this.op(opts)},
  showPauseWith(opts){this._pendingOpts=opts||[];document.getElementById("oa").classList.remove("hidden");document.getElementById("oa").classList.remove("hidden");document.getElementById("pauseBtn").style.display="block";document.getElementById("optC").innerHTML=""},
  async render(id,r){this.clr();if(id==='S-01'){const d=await DL.load(this.g.state.personality),c=d.裂痕记忆||{},t=this.g.state.裂痕类型;var _ks=Object.keys(c||{});if(_ks[t]&&c[_ks[t]]?.background){this.bub('sys','✦ '+c[_ks[t]].background.slice(0,15))}await sl(300)}if(id&&r?.title){this.bub("sys",r.title)}if(r.narrative?.trim()){this.bub('nar',r.narrative.trim());await sl(300)}if(r.dialogue?.trim()){await sl(200);this.bub('pa',r.dialogue.trim());await sl(400)}if(r.sceneHint){await sl(100);this.bub('sys',r.sceneHint)}await sl(300);this._skipAdvance=true;this.op((r.options||[]).filter(o=>!o.condition))},
};

function sg(el){document.querySelectorAll('#gg .b').forEach(b=>b.classList.remove('on'));el.classList.add('on');U.selG=el.dataset.v;ub()}
function sd(el){document.querySelectorAll('#dg .b').forEach(b=>b.classList.remove('on'));el.classList.add('on');U.selD=el.dataset.v}
function ub(){const b=document.getElementById('btnGo'),p=document.getElementById('selP').value;b.disabled=!(p&&U.selG)}
document.getElementById('selP').onchange=ub;

const PF={
ISTJ:{need:'秩序是TA的安全区。答应的事一定会做到，做不到的事不会答应。',mine:'承诺被打破时，TA不会发火——但会在心里记下一笔。混乱和失约会让TA筑起高墙。',conf:'争吵发生时TA往往选择沉默。不是不在乎，是在等自己把逻辑理清楚。'},
ISFJ:{need:'TA记得你说过的每一件小事。对TA来说，关心不是说出来的是做出来的。',mine:'当TA的付出被当作理所当然，TA不会抗议——只会默默减少。等到你发现时已经很久了。',conf:'TA宁愿委屈自己也不愿冲突。但那不代表不受伤。'},
INFJ:{need:'TA能感知到周围人没说出口的情绪。TA渴望的是有人也能读懂TA没说出口的那些。',mine:'虚伪和肤浅是TA最敏感的雷区。一旦觉得你在敷衍，TA会立刻退回自己的世界。',conf:'争执时TA会先让步不是因为认输，是怕伤害到对方。但TA自己也需要空间消化。'},
INTJ:{need:'TA尊重逻辑和效率，但TA更珍惜的是有人愿意走进TA那个复杂的内在体系。',mine:'被否定判断比被否定情绪更难接受。如果TA的逻辑被无理由驳回，TA会直接切断通道。',conf:'TA习惯先退一步，在自己的脑海里把问题拆解完再回应。那个沉默不是冷暴力。'},
ISTP:{need:'TA需要自由的空气。对TA来说，爱不是捆绑而是一起呼吸同一片天空。',mine:'被约束和被迫表达是TA最想逃的事。你越追问TA的感受，TA越找不到词。',conf:'TA不会吵架——TA会消失。给TA空间，TA会自己回来的。'},
ISFP:{need:'TA用颜色和声音感受世界。那些说不出口的情感都藏在TA的作品里。',mine:'当TA的创作被轻率评价，或被要求解释「为什么画这个」，TA会把自己的世界锁起来。',conf:'TA不擅长争辩。受了委屈就躲进自己的壳里，用安静代替抗议。'},
INFP:{need:'在TA的世界里，感觉比事实更真实。TA渴望的是被理解那个世界而不是被纠正。',mine:'当理想被嘲笑、情感被逻辑驳斥，TA会感到被否定。不是反驳不了，是不想争辩。',conf:'TA会把失望默默积攒，在心里判对方出局而对方毫不知情。不是报复只是保护。'},
INTP:{need:'TA脑子里永远在运转一个复杂的系统。TA渴望能有人理解这个系统的语言。',mine:'被打断思考比被批评更让TA烦躁。强迫TA表达情感等于逼TA说外语。',conf:'冲突来临时，TA会撤退到自己的思维堡垒里。不是逃避，是在里面把问题拆解完。'},
ESTP:{need:'TA活在当下。对TA来说，最好的爱是一起去经历而不是一起做计划。',mine:'无聊和重复是TA的天敌。被约束和被预测会让TA想逃。',conf:'TA不喜欢长时间的对峙。吵完一架不如去吃顿好的——这是TA的和解方式。'},
ESFP:{need:'TA用热情照亮身边的人。TA最怕的是自己的快乐成为了别人的负担。',mine:'严肃的指责和负能量氛围会让TA窒息。试着把TA关进一个压抑的空间，TA会枯萎。',conf:'TA习惯用笑容化解紧张。如果TA还在笑说明TA还在乎，真的不在乎了连笑都不会有了。'},
ENFP:{need:'TA看起来开朗活泼，但那层壳的下面是害怕被拒绝的真实。TA渴望的是被接纳全部的自己。',mine:'冷暴力和不回应是TA最深的恐惧。如果TA的热情得不到回应，TA会先怀疑自己。',conf:'TA会在情绪激动时让步不是真的认同，而是怕关系断裂。等平静下来TA才会说真话。'},
ENTP:{need:'对TA来说爱是一场永不结束的对话。TA渴望有人能接住每一个思想抛出的球。',mine:'拒绝辩论和不接受新观点是TA无法忍受的。思想的牢笼比物理的牢笼更让TA窒息。',conf:'TA会把争吵变成一场智力游戏。不是想赢你，是想和你一起探索某个问题的边界。'},
ESTJ:{need:'TA相信秩序和规则。对TA来说，爱意味着一起把生活经营得井井有条。',mine:'不负责任和挑战规则是TA的红线。如果被认为不可靠，TA会直接把你从计划表里删除。',conf:'TA习惯掌控局面。意见不合时TA会摆事实讲道理，不是情绪化而是解决问题导向。'},
ESFJ:{need:'TA通过付出来感受被需要。为别人做事的本身就是TA表达爱的方式。',mine:'当付出被忽视而无回应时，TA不会开口要——TA会默默减少自己的存在感。',conf:'TA希望每个人都能开心。冲突发生时TA往往先让步，但回到家才会自己消化难受。'},
ENFJ:{need:'TA有一种天赋：能让你觉得自己是最好的版本。但TA自己也需要被看见那个第一眼的版本。',mine:'当TA帮助你而你表现得无所谓，或者TA的关心被冷漠回应时，TA会怀疑自己是不是多余的。',conf:'TA会先照顾你的情绪然后把问题解决掉。但TA自己的情绪往往是在深夜独处时才出来。'},
ENTJ:{need:'TA要的不是顺从，是一个能与TA并肩的人。TA尊重能反驳TA但也支持TA的人。',mine:'优柔寡断和模棱两可会让TA失去耐心。TA没有时间等待一个不明确的方向。',conf:'TA直面冲突不回避。对TA来说，把问题摊开解决才是对关系的尊重。隐忍不是TA的风格。'}};

async function goIntro(){const p=document.getElementById('selP').value,g=U.selG;if(!p||!g)return;U.scr('loadingScreen');const d=await DL.load(p),pf=PF[p]||{};document.getElementById('iCode').textContent=p;document.getElementById('iName').textContent=d.meta.name;document.getElementById('iTheme').textContent=`「${d.meta.theme||''}」`;document.getElementById('iKey').textContent=pf.need?.split('。')[0]||'——';document.getElementById('iNeed').textContent=pf.need?.split('。')[0]||'——';document.getElementById('iMine').textContent=pf.mine||'——';document.getElementById('iConflict').textContent=pf.conf||'——';U.scr('introScreen')}

function backStart(){U.scr('startScreen');U.g=null}

async function startGame(){const p=document.getElementById('selP').value,d=U.selD,g=U.selG;if(!p||!g)return;U.scr('loadingScreen');U.g=new GameEngine(DL);const dt=await DL.load(p);document.getElementById('ghCode').textContent=p;document.getElementById('ghName').textContent=dt.meta.name;const de=document.getElementById('ghDiff');de.textContent=d;de.className=d==='现实线'?'gh-d rl':'gh-d';U.g.subscribe(e=>{if(e.type==='scene'&&U._skipAdvance){U._pendingRender={id:e.sceneId,scene:e.scene}}else if(e.type==='scene'){U.render(e.sceneId,e.scene)}if(e.type==='choice'&&e.nextScene&&!e.nextScene.startsWith('__')){}});U.scr('gameScreen');U.clr();await U.g.startGame(p,d,g)}

function restartSame(){startGame()}
function sl(ms){return new Promise(r=>setTimeout(r,ms))}

function showGal(){const g=GameEngine.getGallery();U.scr('galleryScreen');const c=document.getElementById('galC');const LB={'BE-1':'💔 被动模式','BE-2':'💔 工具箱关闭','BE-3':'💔 你留下的是功能','NE-1':'🌊 冰层融化','GE-1':'🔥 行动被看见','PE-1':'✨ 不用解释的回应'};const CS={'BE-1':'b','BE-2':'b','BE-3':'b','NE-1':'n','GE-1':'g','PE-1':'p'};const NM={'ISTJ':'物流师','ISFJ':'守卫者','INFJ':'提倡者','INTJ':'建筑师','ISTP':'鉴赏家','ISFP':'探险家','INFP':'调停者','INTP':'逻辑学家','ESTP':'企业家','ESFP':'表演者','ENFP':'竞选者','ENTP':'辩论家','ESTJ':'总经理','ESFJ':'执政官','ENFJ':'主人公','ENTJ':'指挥官'};const ks=Object.keys(g);if(!ks.length){c.innerHTML='<div class="gal-emp">还没有解锁任何结局<br>去挽回 TA 吧</div>';return}let h='';ks.forEach(k=>{const es=g[k]||[];h+=`<div class="gal-p"><div class="hd"><span class="c">${k}</span><span class="nm">${NM[k]||''}</span></div><div class="gal-bs">${es.map(e=>`<span class="gal-b ${CS[e.ending]||'b'}">${LB[e.ending]||e.ending}</span>`).join('')}</div><div class="gal-ft"><span>已解锁 ${es.length}/6</span><span>${Math.round(es.length/6*100)}%</span></div></div>`});c.innerHTML=h}
</script>
</body>
</html>
